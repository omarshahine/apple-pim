name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mcp-server-tests:
    name: MCP Server (Node)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package.json

      - name: Install root dependencies
        run: npm install --prefix ..

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build MCP server
        run: npm run build

  agent-evals:
    name: Agent Evals
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install eval dependencies
        run: npm install --prefix evals

      - name: Run agent evals
        run: npm run eval
        env:
          SKIP_MODEL_EVALS: "1"

  swift-cli-tests:
    name: Swift CLI
    runs-on: macos-latest
    defaults:
      run:
        working-directory: swift
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run Swift tests
        run: swift test

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: omarshahine/version-consistency-action@v1
        with:
          sets: |
            - name: "Apple PIM plugin"
              sources:
                - .claude-plugin/plugin.json:.version
                - .claude-plugin/marketplace.json:.plugins[0].version
                - mcp-server/package.json:.version
                - openclaw/package.json:.version
                - openclaw/openclaw.plugin.json:.version
